<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Golf</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Game state
        let ball = { x: 100, y: 0, vx: 0, vy: 0, radius: 6, onPlatform: false };
        let holes = []; // Array of all holes
        let currentHoleIndex = 0;
        let terrain = [];
        let terrainEndX = 0;
        let power = 0;
        let isCharging = false;
        let powerDirection = 1;
        let strokes = 0;
        let holeNumber = 1;
        let camera = { x: 0, y: 0 };
        let particles = [];
        let seed = Math.random();
        
        // Hole transition state
        let holeTransition = {
            active: false,
            phase: 0, // 0: rising, 1: pushing ball, 2: creating new hole
            timer: 0,
            risingSpeed: 3
        };
        
        // Noise function for procedural terrain
        function noise(x) {
            return Math.sin(x * 0.005) * 25 + Math.sin(x * 0.02) * 10 + Math.sin(x * 0.05) * 4;
        }
        
        // Generate terrain segment
        function generateTerrainSegment(startX, length) {
            const groundY = canvas.height * 0.65;
            
            for (let x = startX; x <= startX + length; x += 5) {
                const height = noise(x + seed * 1000) + (Math.random() - 0.5) * 2;
                terrain.push({ x: x, y: groundY + height });
            }
            
            terrainEndX = startX + length;
        }
        
        // Ensure terrain exists for given x position
        function ensureTerrain(x) {
            while (terrainEndX < x + canvas.width + 500) {
                generateTerrainSegment(terrainEndX, 500);
            }
        }
        
        // Get ground height at x position
        function getGroundY(x) {
            // Find terrain points around x
            let left = null, right = null;
            
            for (let i = 0; i < terrain.length; i++) {
                if (terrain[i].x <= x) left = terrain[i];
                if (terrain[i].x >= x && right === null) right = terrain[i];
                if (right !== null) break;
            }
            
            if (left && right && left !== right) {
                const ratio = (x - left.x) / (right.x - left.x);
                return left.y + (right.y - left.y) * ratio;
            } else if (left) {
                return left.y;
            } else if (right) {
                return right.y;
            }
            
            return canvas.height * 0.65;
        }
        
        // Create a new hole
        function createHole(x) {
            ensureTerrain(x + 200);
            return {
                x: x,
                y: getGroundY(x),
                radius: 10,
                active: true,
                rising: false,
                riseHeight: 0
            };
        }
        
        // Initialize
        function init() {
            terrain = [];
            terrainEndX = 0;
            generateTerrainSegment(0, canvas.width + 1000);
            
            ball.x = 100;
            ball.y = getGroundY(100) - ball.radius;
            ball.vx = 0;
            ball.vy = 0;
            ball.onPlatform = false;
            
            holes = [createHole(canvas.width - 200)];
            currentHoleIndex = 0;
            
            strokes = 0;
            holeNumber = 1;
        }
        
        // Particle system
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 3 - 1,
                    life: 1,
                    size: Math.random() * 3 + 1,
                    color: color || '#DEB887'
                });
            }
        }
        
        // Draw functions
        function drawSky() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#87CEEB');
            grad.addColorStop(0.4, '#E8D5B7');
            grad.addColorStop(1, '#D4A574');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        function drawSun() {
            const x = canvas.width * 0.8;
            const y = canvas.height * 0.15;
            
            // Glow
            const glow = ctx.createRadialGradient(x, y, 0, x, y, 80);
            glow.addColorStop(0, 'rgba(255, 248, 220, 0.6)');
            glow.addColorStop(1, 'rgba(244, 164, 96, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y, 80, 0, Math.PI * 2);
            ctx.fill();
            
            // Sun
            ctx.fillStyle = '#FFF8DC';
            ctx.beginPath();
            ctx.arc(x, y, 30, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawTerrain() {
            if (terrain.length < 2) return;
            
            // Only draw visible terrain
            const startIdx = Math.max(0, terrain.findIndex(t => t.x >= camera.x) - 1);
            const endIdx = Math.min(terrain.length, terrain.findIndex(t => t.x > camera.x + canvas.width) + 2);
            
            if (startIdx >= endIdx) return;
            
            // Fill terrain
            ctx.beginPath();
            ctx.moveTo(terrain[startIdx].x - camera.x, terrain[startIdx].y);
            
            for (let i = startIdx + 1; i < endIdx; i++) {
                ctx.lineTo(terrain[i].x - camera.x, terrain[i].y);
            }
            
            ctx.lineTo(terrain[endIdx - 1].x - camera.x, canvas.height);
            ctx.lineTo(terrain[startIdx].x - camera.x, canvas.height);
            ctx.closePath();
            
            const grad = ctx.createLinearGradient(0, canvas.height * 0.6, 0, canvas.height);
            grad.addColorStop(0, '#F5DEB3');
            grad.addColorStop(0.5, '#DEB887');
            grad.addColorStop(1, '#CD853F');
            ctx.fillStyle = grad;
            ctx.fill();
            
            // Top line
            ctx.strokeStyle = '#A0826D';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function drawHole(hole) {
            const x = hole.x - camera.x;
            const y = hole.y - hole.riseHeight;
            
            // Shadow/hole in ground
            ctx.fillStyle = '#2C1810';
            ctx.beginPath();
            ctx.ellipse(x, y + 2, hole.radius, hole.radius * 0.35, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Flag pole (rises with hole)
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y - 50 - hole.riseHeight * 0.5);
            ctx.stroke();
            
            // Flag
            ctx.fillStyle = '#DC143C';
            ctx.beginPath();
            ctx.moveTo(x, y - 50 - hole.riseHeight * 0.5);
            ctx.lineTo(x + 20, y - 42 - hole.riseHeight * 0.5);
            ctx.lineTo(x, y - 34 - hole.riseHeight * 0.5);
            ctx.closePath();
            ctx.fill();
            
            // Platform that rises (visual only)
            if (hole.riseHeight > 0) {
                ctx.fillStyle = 'rgba(222, 184, 135, 0.8)';
                ctx.fillRect(x - hole.radius * 1.5, y - 5, hole.radius * 3, 5);
            }
        }
        
        function drawBall() {
            const x = ball.x - camera.x;
            const y = ball.y;
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.ellipse(x, ball.y + ball.radius - 1, ball.radius * 0.8, ball.radius * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Ball
            const grad = ctx.createRadialGradient(x - 2, y - 2, 0, x, y, ball.radius);
            grad.addColorStop(0, '#FFFFFF');
            grad.addColorStop(1, '#D3D3D3');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - camera.x, p.y, p.size, p.size);
                ctx.globalAlpha = 1;
                
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life -= 0.02;
                
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function drawUI() {
            // Score panel
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(20, 20, 180, 70);
            
            ctx.fillStyle = '#F4A460';
            ctx.font = 'bold 22px monospace';
            ctx.fillText(`Hole ${holeNumber}`, 30, 50);
            
            ctx.fillStyle = '#FFF';
            ctx.font = '16px monospace';
            ctx.fillText(`Strokes: ${strokes}`, 30, 75);
            
            // Power meter
            if (isCharging) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(canvas.width / 2 - 100, canvas.height - 80, 200, 50);
                
                ctx.fillStyle = '#333';
                ctx.fillRect(canvas.width / 2 - 90, canvas.height - 70, 180, 20);
                
                const grad = ctx.createLinearGradient(canvas.width / 2 - 90, 0, canvas.width / 2 + 90, 0);
                grad.addColorStop(0, '#4CAF50');
                grad.addColorStop(0.5, '#FFC107');
                grad.addColorStop(1, '#F44336');
                ctx.fillStyle = grad;
                ctx.fillRect(canvas.width / 2 - 90, canvas.height - 70, 180 * (power / 100), 20);
                
                ctx.fillStyle = '#FFF';
                ctx.font = '12px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('POWER', canvas.width / 2, canvas.height - 45);
                ctx.textAlign = 'left';
            }
            
            // Instructions
            if (strokes === 0 && !isCharging && !holeTransition.active) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(canvas.width / 2 - 140, canvas.height / 2 + 60, 280, 30);
                ctx.fillStyle = '#FFF';
                ctx.font = '14px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('Hold SPACE or Click to charge, release to swing', canvas.width / 2, canvas.height / 2 + 80);
                ctx.textAlign = 'left';
            }
        }
        
        // Start hole transition
        function startHoleTransition() {
            holeTransition.active = true;
            holeTransition.phase = 0;
            holeTransition.timer = 0;
            
            const currentHole = holes[currentHoleIndex];
            currentHole.rising = true;
            
            // Ball is now on the rising platform
            ball.onPlatform = true;
            ball.vx = 0;
            ball.vy = 0;
        }
        
        // Update hole transition
        function updateHoleTransition() {
            if (!holeTransition.active) return;
            
            const currentHole = holes[currentHoleIndex];
            
            // Phase 0: Hole rises up
            if (holeTransition.phase === 0) {
                currentHole.riseHeight += holeTransition.risingSpeed;
                
                // Ball rises with the hole platform
                if (ball.onPlatform) {
                    ball.y = (currentHole.y - currentHole.riseHeight) - ball.radius - 2;
                }
                
                // After rising enough, move to next phase
                if (currentHole.riseHeight >= 150) {
                    holeTransition.phase = 1;
                    holeTransition.timer = 0;
                    
                    // Create new hole to the right
                    const newHoleX = currentHole.x + canvas.width * 0.6 + Math.random() * 200;
                    const newHole = createHole(newHoleX);
                    holes.push(newHole);
                }
            }
            // Phase 1: Brief pause at top, then push ball to new position
            else if (holeTransition.phase === 1) {
                holeTransition.timer++;
                
                if (holeTransition.timer > 30) {
                    holeTransition.phase = 2;
                    
                    // Move ball to position for next hole
                    const nextHole = holes[currentHoleIndex + 1];
                    const targetX = nextHole.x - 200 - Math.random() * 100;
                    
                    // Ensure terrain exists
                    ensureTerrain(targetX);
                    
                    // Animate ball falling
                    ball.x = targetX;
                    ball.y = currentHole.y - currentHole.riseHeight - 100;
                    ball.onPlatform = false;
                    ball.vy = 2;
                }
            }
            // Phase 2: Reset for next hole
            else if (holeTransition.phase === 2) {
                holeTransition.active = false;
                currentHole.rising = false;
                
                // Move to next hole
                currentHoleIndex++;
                holeNumber++;
                strokes = 0;
                
                // Clean up old holes that are far behind
                if (holes.length > 3) {
                    holes.shift();
                    currentHoleIndex--;
                }
            }
        }
        
        // Physics
        function update() {
            // Power charging
            if (isCharging) {
                power += 3 * powerDirection;
                if (power >= 100) { power = 100; powerDirection = -1; }
                else if (power <= 0) { power = 0; powerDirection = 1; }
            }
            
            // Hole transition
            if (holeTransition.active) {
                updateHoleTransition();
                
                // Camera follows ball during transition
                camera.x = ball.x - canvas.width * 0.25;
                
                // Keep generating terrain ahead
                ensureTerrain(camera.x + canvas.width + 500);
                return;
            }
            
            // Ensure terrain exists ahead
            ensureTerrain(ball.x + canvas.width);
            
            // Ball physics
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // Gravity and ground collision
            const groundY = getGroundY(ball.x);
            if (ball.y + ball.radius >= groundY) {
                ball.y = groundY - ball.radius;
                ball.vx *= 0.97;
                ball.vy = -ball.vy * 0.3;
                
                if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.5) {
                    ball.vx = 0;
                    ball.vy = 0;
                }
                
                // Roll particles
                if (Math.abs(ball.vx) > 0.5 && Math.random() < 0.2) {
                    createParticles(ball.x, ball.y + ball.radius, 1);
                }
            } else {
                ball.vy += 0.4;
            }
            
            // Check collision with current hole
            const currentHole = holes[currentHoleIndex];
            const dx = ball.x - currentHole.x;
            const dy = ball.y - (currentHole.y - 5);
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < currentHole.radius && Math.abs(ball.vx) < 4 && !holeTransition.active) {
                // Ball in hole! Start transition
                createParticles(currentHole.x, currentHole.y, 20, '#F5DEB3');
                startHoleTransition();
            }
            
            // Camera follow
            camera.x = Math.max(0, ball.x - canvas.width * 0.25);
            
            // Cleanup old terrain behind camera
            const cleanupX = camera.x - 1000;
            terrain = terrain.filter(t => t.x > cleanupX);
        }
        
        // Swing
        function swing() {
            if (holeTransition.active || (ball.vx !== 0 || ball.vy !== 0)) return;
            
            isCharging = false;
            strokes++;
            
            const speed = 12 * (power / 100);
            const angle = -0.25 - Math.random() * 0.15;
            ball.vx = Math.cos(angle) * speed;
            ball.vy = Math.sin(angle) * speed;
            
            createParticles(ball.x, ball.y + ball.radius, 8);
            power = 0;
        }
        
        // Game loop
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawSky();
            drawSun();
            drawTerrain();
            
            // Draw all holes
            holes.forEach(hole => {
                if (hole.x > camera.x - 100 && hole.x < camera.x + canvas.width + 100) {
                    drawHole(hole);
                }
            });
            
            drawBall();
            drawParticles();
            drawUI();
            
            update();
            requestAnimationFrame(loop);
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isCharging && ball.vx === 0 && ball.vy === 0 && !holeTransition.active) {
                e.preventDefault();
                isCharging = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isCharging) {
                e.preventDefault();
                swing();
            }
        });
        
        let mouseDown = false;
        document.addEventListener('mousedown', () => {
            if (!isCharging && ball.vx === 0 && ball.vy === 0 && !holeTransition.active) {
                isCharging = true;
                mouseDown = true;
            }
        });
        
        document.addEventListener('mouseup', () => {
            if (isCharging && mouseDown) {
                swing();
                mouseDown = false;
            }
        });
        
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isCharging && ball.vx === 0 && ball.vy === 0 && !holeTransition.active) {
                isCharging = true;
            }
        }, { passive: false });
        
        document.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (isCharging) swing();
        });
        
        // Resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Start
        init();
        loop();
    </script>
</body>
</html>
