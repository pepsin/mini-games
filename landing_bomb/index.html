<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bob-omb Squad</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;

<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive sizing - vertical ratio
function resize() {
  const ratio = 450 / 800;
  let w = window.innerWidth;
  let h = window.innerHeight;
  if (w / h > ratio) {
    canvas.height = h;
    canvas.width = h * ratio;
  } else {
    canvas.width = w;
    canvas.height = w / ratio;
  }
}
resize();
window.addEventListener('resize', resize);

// Virtual coordinate system (vertical: 450 wide x 800 tall)
const W = 450, H = 800;
function sx(x) { return x * canvas.width / W; }
function sy(y) { return y * canvas.height / H; }
function toGame(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (cx - rect.left) / canvas.width * W,
    y: (cy - rect.top) / canvas.height * H
  };
}

// Game state
let score = 0;
let highScore = parseInt(localStorage.getItem('bobomb_highscore') || '0');
let lives = 4;
let gameOver = false;
let gameStarted = false;
let bombs = [];
let projectiles = [];
let explosions = [];
let clouds = [];
let particles = [];
let frameCount = 0;

// Resources
const resources = {
  background: {
    image: new Image(),
    loaded: false,
    config: {
      width: 450,
      height: 80,
      anchorX: 0.5,

    }
  },
  sun: {
    image: new Image(),

      width: 80,

      anchorY: 0.5,

    }
  },

    frames: {},
    currentState: 'alive',

};

// Load slingshot config
fetch('assets/slingshot/info.json')
  .then(r => r.json())
  .then(data => {
    resources.slingshot.config.data = data;
    if (data.position) {
      resources.slingshot.config.position = data.position;

    if (data.parts) {
      resources.slingshot.config.parts = data.parts;
    }
  })
  .catch(() => console.log('Using default slingshot position'));

// Load background image
resources.background.image.src = 'assets/background/background.png';
resources.background.image.onload = () => {
  resources.background.loaded = true;
  console.log('Background image loaded');
};
resources.background.image.onerror = () => {
  console.log('Background image failed to load, using fallback');
};

// Load sun image
resources.sun.image.src = 'assets/sun/sun.png';
resources.sun.image.onload = () => {
  resources.sun.loaded = true;
  console.log('Sun image loaded');
};
resources.sun.image.onerror = () => {
  console.log('Sun image failed to load, using fallback');
};

// Load flower animation frames
function loadFlowerFrames() {
  const states = ['alive_01', 'alive_02', 'alive_03', 'alive_04', 'dead'];
  let loadedCount = 0;
  
  states.forEach(state => {
    const img = new Image();
    img.src = `assets/flower/${state}.png`;
    img.onload = () => {
      resources.flower.frames[state] = img;
      loadedCount++;
      if (loadedCount === states.length) {
        resources.flower.loaded = true;
        console.log('Flower frames loaded');
      }
    };
    img.onerror = () => {
      console.log(`Flower frame ${state} failed to load`);
      loadedCount++;
    };
  });
}
loadFlowerFrames();

// Load flower config for positions
fetch('assets/flower/info.json')
  .then(r => r.json())
  .then(data => {
    resources.flower.config = { ...resources.flower.config, ...data };
    console.log('Flower config loaded:', data.positions);
  })
  .catch(() => console.log('Using default flower positions'));

// ========== WAVE SYSTEM ==========
// Wave-based spawn system - tunable parameters for difficulty curve
let currentWave = 1;
let waveTimer = 0;           // Frames since wave started
let waveDuration = 600;      // Default wave duration (10 seconds at 60fps)
let interWaveTimer = 0;      // Break between waves
let interWaveDuration = 120; // 2 seconds break between waves
let isInterWave = false;     // Are we in between waves?
let bombsSpawnedThisWave = 0;
let totalBombsThisWave = 0;
let nextSpawnTime = 0;       // Frame count when next bomb should spawn

// Wave configuration function - returns spawn parameters for given wave
// This is the main tuning function for difficulty
function getWaveConfig(wave) {
  // Clamp wave to max 200 for calculation safety
  const w = Math.min(wave, 200);
  
  // Base difficulty multiplier (1.0 at wave 1, ~5.0 at wave 100)
  // Using a curve that starts slow and accelerates after wave 30
  let difficultyMultiplier;
  if (w <= 30) {
    // Waves 1-30: Gentle linear increase (easy for most players)
    difficultyMultiplier = 1 + (w - 1) * 0.05;
  } else {
    // Waves 31+: Exponential increase (hard for elite players)
    // At wave 100: difficulty ~5.0
    const excess = w - 30;
    difficultyMultiplier = 2.45 + excess * 0.036;
  }
  
  // ========== TUNABLE PARAMETERS ==========
  
  // Total bombs per wave
  // Wave 1: 3 bombs, Wave 30: ~10 bombs, Wave 100: ~20 bombs
  const bombsPerWave = Math.floor(3 + w * 0.18 + Math.pow(w / 50, 2) * 5);
  
  // Wave duration in frames (varies slightly to keep it interesting)
  // Wave 1: 8 seconds, Wave 30: 9s, Wave 100: 10s
  const waveDurationFrames = Math.floor((8 + Math.min(w * 0.03, 2)) * 60);
  
  // Bomb speed range
  // Wave 1: 0.6-1.0, Wave 30: 1.2-1.8, Wave 100: 2.2-3.5
  const minSpeed = 0.6 + w * 0.02 + Math.pow(w / 60, 2) * 0.8;
  const maxSpeed = minSpeed + 0.4 + w * 0.01;
  
  // Sway (horizontal movement) - makes bombs harder to hit
  // Wave 1: minimal sway, Wave 100: significant sway
  const maxSway = 0.2 + w * 0.015;
  
  // Bomb size variation (smaller bombs at higher waves)
  const minRadius = Math.max(10, 16 - w * 0.04);
  const maxRadius = Math.max(14, 20 - w * 0.04);
  
  // Bomb health (for future use - multi-hit bombs)
  const bombHealth = w >= 50 ? 1 + Math.floor((w - 50) / 25) : 1;
  
  // Special bomb chance (fast bombs, zigzag bombs, etc.)
  // Wave 1-10: 0%, Wave 30: 10%, Wave 100: 40%
  const specialBombChance = Math.max(0, (w - 10) * 0.005);
  
  // Cluster bomb chance (bombs that split when hit)
  // Starts at wave 20
  const clusterBombChance = w >= 20 ? Math.min(0.15, (w - 20) * 0.003) : 0;
  
  return {
    bombsPerWave,
    waveDurationFrames,
    minSpeed,
    maxSpeed,
    maxSway,
    minRadius,
    maxRadius,
    bombHealth,
    specialBombChance,
    clusterBombChance,
    difficultyMultiplier
  };
}

// Calculate spawn times for a wave (returns array of frame offsets)
function calculateSpawnTimes(config) {
  const spawnTimes = [];
  const { bombsPerWave, waveDurationFrames } = config;
  
  if (bombsPerWave === 0) return spawnTimes;
  
  // Distribute bombs throughout the wave with some randomness
  // First bomb always comes early, last bomb comes before wave ends
  const safeDuration = waveDurationFrames - 60; // Leave 1 second buffer at end
  
  for (let i = 0; i < bombsPerWave; i++) {
    // Base position in wave (0 to 1)
    const basePosition = (i + 1) / (bombsPerWave + 1);
    
    // Add randomness ±30% to make patterns less predictable
    const randomOffset = (Math.random() - 0.5) * 0.3;
    const position = Math.max(0.05, Math.min(0.95, basePosition + randomOffset));
    
    spawnTimes.push(Math.floor(position * safeDuration));
  }
  
  // Sort spawn times
  return spawnTimes.sort((a, b) => a - b);
}

// Get current wave configuration
let currentWaveConfig = getWaveConfig(1);
let waveSpawnSchedule = [];

// Start a new wave
function startWave(waveNum) {
  currentWave = waveNum;
  currentWaveConfig = getWaveConfig(waveNum);
  
  waveTimer = 0;
  bombsSpawnedThisWave = 0;
  totalBombsThisWave = currentWaveConfig.bombsPerWave;
  
  // Calculate spawn schedule for this wave
  waveSpawnSchedule = calculateSpawnTimes(currentWaveConfig);
  
  // Set first spawn time
  nextSpawnTime = waveSpawnSchedule.length > 0 ? waveSpawnSchedule[0] : 0;
  
  console.log(`Wave ${waveNum} started: ${totalBombsThisWave} bombs, ${currentWaveConfig.waveDurationFrames / 60}s duration`);
}

// End current wave, start inter-wave break
function endWave() {
  isInterWave = true;
  interWaveTimer = 0;
  
  // Inter-wave duration decreases slightly at higher waves (less rest for elites)
  interWaveDuration = Math.max(60, 120 - currentWave * 0.5);
  
  console.log(`Wave ${currentWave} completed! Break time: ${interWaveDuration / 60}s`);
}

// ========== END WAVE SYSTEM ==========

// Slingshot state
const sling = { x: 225, y: 800, prongW: 0, prongH: 100 };
let dragging = false;
let dragStart = null;
let dragCurrent = null;
const maxDrag = 120;

// Initialize clouds with random scale (0.7 - 1.3)
for (let i = 0; i < 8; i++) {
  // Cloud scale range: 0.7 - 1.3 (final: 0.84 - 1.56 after 1.2x)
  const scale = 0.7 + Math.random() * 0.6;
  
  // Depth factor: larger clouds appear closer (faster)
  const depthFactor = 1 - (scale - 0.7) / 0.6 * 0.4; // 0.6 - 1.0
  
  // Clouds in top 2/5 of screen (y: -50 to H*2/5)
  const yPos = -50 + Math.random() * (H * 2/5 + 50);
  
  clouds.push({
    x: Math.random() * (W + 200),
    y: yPos,
    w: (60 + Math.random() * 80) * scale * 1.2,
    scale: scale,
    speed: (0.1 + Math.random() * 0.2) * depthFactor
    // No opacity - clouds use full alpha
  });
}

// Sort by scale: larger (background) first, smaller (foreground) last
clouds.sort((a, b) => b.scale - a.scale);

// --- Drawing Functions ---

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, sy(H));
  grad.addColorStop(0, '#4ab8ff');
  grad.addColorStop(0.6, '#87CEEB');
  grad.addColorStop(1, '#b8e8ff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawSun() {
  if (resources.sun.loaded && resources.sun.image.complete) {
    const cfg = resources.sun.config;
    const aspectRatio = resources.sun.image.width / resources.sun.image.height;
    
    const drawWidth = sx(cfg.width);
    const drawHeight = drawWidth / aspectRatio;
    
    const posX = sx(cfg.position.x);
    const posY = sy(cfg.position.y);
    const drawX = posX - drawWidth * cfg.anchorX;
    const drawY = posY - drawHeight * cfg.anchorY;
    
    ctx.drawImage(resources.sun.image, drawX, drawY, drawWidth, drawHeight);
    return;
  }
  
  // Fallback: simple placeholder
  const cx = sx(380), cy = sy(70), r = sx(35);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#FFE44D';
  ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = sx(2);
  ctx.stroke();
}

function drawRainbow() {
  const cx = sx(80), cy = sy(140);
  const colors = ['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#4B0082','#9400D3'];
  for (let i = colors.length - 1; i >= 0; i--) {
    ctx.beginPath();
    ctx.arc(cx, cy, sx(70 + i * 6), Math.PI, 0, false);
    ctx.strokeStyle = colors[i];
    ctx.lineWidth = sx(6);
    ctx.globalAlpha = 0.4;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawCloud(cloud) {
  // Apply 1.2x scale to cloud size (no alpha)
  const scale = 1.2;
  const x = sx(cloud.x), y = sy(cloud.y), w = sx(cloud.w) * scale;
  
  ctx.fillStyle = 'rgba(255,255,255,1.0)';  // Full opacity, no alpha variation
  
  // Main cloud body
  ctx.beginPath();
  ctx.ellipse(x, y, w * 0.5, w * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Left puff
  ctx.beginPath();
  ctx.ellipse(x - w * 0.25, y + w * 0.05, w * 0.3, w * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Right puff
  ctx.beginPath();
  ctx.ellipse(x + w * 0.25, y + w * 0.05, w * 0.35, w * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Top puff
  ctx.beginPath();
  ctx.ellipse(x + w * 0.05, y - w * 0.12, w * 0.3, w * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawWall() {
  // Try to use background image if loaded
  if (resources.background.loaded && resources.background.image.complete) {
    const cfg = resources.background.config;
    const aspectRatio = resources.background.image.width / resources.background.image.height;
    
    // Calculate draw dimensions maintaining aspect ratio
    const drawWidth = sx(cfg.width);
    const drawHeight = drawWidth / aspectRatio;
    
    // Calculate position based on anchor
    const posX = sx(cfg.position.x);
    const posY = sy(cfg.position.y);
    const drawX = posX - drawWidth * cfg.anchorX;
    const drawY = posY - drawHeight * cfg.anchorY;
    
    ctx.drawImage(resources.background.image, drawX, drawY, drawWidth, drawHeight);
    return;
  }
  
  // Fallback: programmatic drawing
  const wallY = sy(H - 80);
  const wallH = sy(80);
  // Wall background
  ctx.fillStyle = '#E8DCC8';
  ctx.fillRect(0, wallY, canvas.width, wallH);
  // Brick pattern
  const bw = sx(40), bh = sy(14);
  ctx.strokeStyle = '#D4C4A8';
  ctx.lineWidth = sx(1);
  for (let row = 0; row < 6; row++) {
    const yy = wallY + row * bh;
    const offset = (row % 2) * bw * 0.5;
    for (let col = -1; col < W / 40 + 1; col++) {
      const xx = offset + col * bw;
      ctx.strokeRect(xx, yy, bw, bh);
    }
  }
  // Top edge / cap
  ctx.fillStyle = '#D2B48C';
  ctx.fillRect(0, wallY - sy(5), canvas.width, sy(5));
  // Green hedge on top
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(0, wallY - sy(14), canvas.width, sy(10));
  ctx.fillStyle = '#388E3C';
  for (let i = 0; i < W; i += 12) {
    ctx.beginPath();
    ctx.arc(sx(i), wallY - sy(14), sx(7), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFlower(x, y, alive, frameIndex) {
  // Use image if loaded
  if (resources.flower.loaded) {
    // Get current frame image
    let frameKey;
    if (alive) {
      // Cycle through alive frames: 01, 02, 03, 04
      const frameIndices = ['alive_01', 'alive_02', 'alive_03', 'alive_04'];
      frameKey = frameIndices[frameIndex % 4];
    } else {
      frameKey = 'dead';
    }
    
    const img = resources.flower.frames[frameKey];
    if (img && img.complete) {
      const size = { width: 48, height: 64 };
      const anchor = { x: 0.5, y: 0.8 };
      
      const aspectRatio = img.width / img.height;
      const drawWidth = sx(size.width);
      const drawHeight = drawWidth / aspectRatio;
      
      const drawX = sx(x) - drawWidth * anchor.x;
      const drawY = sy(y) - drawHeight * anchor.y;
      
      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
      return;
    }
  }
  
  // Fallback: simple placeholder
  const fx = sx(x), fy = sy(y), r = sx(9);
  // Stem
  ctx.strokeStyle = alive ? '#2E7D32' : '#8B7355';
  ctx.lineWidth = sx(3);
  ctx.beginPath();
  ctx.moveTo(fx, fy);
  ctx.lineTo(fx, fy + sy(25));
  ctx.stroke();
  // Simple flower head
  ctx.fillStyle = alive ? '#FF69B4' : '#888';
  ctx.beginPath();
  ctx.arc(fx, fy, r, 0, Math.PI * 2);
  ctx.fill();
}

// Health flowers - 4 flowers on the ground representing lives
let flowerAlive = [true, true, true, true];
let flowerFrameIndices = [0, 1, 2, 3]; // Each flower starts at different frame
const flowerHitRadius = 50; // how close a bomb must land to kill a flower

// Get flower positions from config or use defaults
function getFlowerPositions() {
  if (resources.flower?.config?.positions) {
    return resources.flower.config.positions;
  }
  // Default positions
  return [
    { x: 90, y: 708 },
    { x: 180, y: 708 },
    { x: 270, y: 708 },
    { x: 360, y: 708 }
  ];
}

function drawHealthFlowers() {
  const positions = getFlowerPositions();
  for (let i = 0; i < 4; i++) {
    const pos = positions[i] || { x: 90 + i * 90, y: 708 };
    drawFlower(pos.x, pos.y, flowerAlive[i], flowerFrameIndices[i]);
  }
}

function drawSlingshot() {
  const x = sx(sling.x), y = sy(sling.y);
  const pw = sx(sling.prongW), ph = sy(sling.prongH);
  const baseW = sx(20), baseH = sy(15);
  const gap = sx(18);

  // Base
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x - baseW / 2, y, baseW, baseH);
  // Left prong
  ctx.fillStyle = '#A0522D';
  ctx.beginPath();
  ctx.moveTo(x - gap - pw / 2, y - ph);
  ctx.lineTo(x - gap + pw / 2, y - ph);
  ctx.lineTo(x - gap / 2 + pw / 2, y);
  ctx.lineTo(x - gap / 2 - pw / 2, y);
  ctx.fill();
  ctx.strokeStyle = '#6B3410';
  ctx.lineWidth = sx(1);
  ctx.stroke();
  // Right prong
  ctx.beginPath();
  ctx.moveTo(x + gap - pw / 2, y - ph);
  ctx.lineTo(x + gap + pw / 2, y - ph);
  ctx.lineTo(x + gap / 2 + pw / 2, y);
  ctx.lineTo(x + gap / 2 - pw / 2, y);
  ctx.fillStyle = '#A0522D';
  ctx.fill();
  ctx.stroke();
  // Prong tips
  ctx.fillStyle = '#D2691E';
  ctx.beginPath();
  ctx.arc(x - gap, y - ph, sx(7), 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + gap, y - ph, sx(7), 0, Math.PI * 2);
  ctx.fill();

  // Rubber band - use config parts if available
  const parts = resources.slingshot.config.parts;
  const leftTip = parts ? 
    { x: sling.x + parts.leftTip.x, y: sling.y + parts.leftTip.y } :
    { x: sling.x - 25, y: sling.y - 100 };
  const rightTip = parts ? 
    { x: sling.x + parts.rightTip.x, y: sling.y + parts.rightTip.y } :
    { x: sling.x + 25, y: sling.y - 100 };

  if (dragging && dragCurrent) {
    const dx = dragCurrent.x - sling.x;
    const dy = dragCurrent.y - sling.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const clampDist = Math.min(dist, maxDrag);
    const angle = Math.atan2(dy, dx);
    const pullX = sling.x + Math.cos(angle) * clampDist;
    const pullY = sling.y + Math.sin(angle) * clampDist;

    // Band from left tip to pull point
    ctx.strokeStyle = '#8B0000';
    ctx.lineWidth = sx(4);
    ctx.beginPath();
    ctx.moveTo(sx(leftTip.x), sy(leftTip.y));
    ctx.lineTo(sx(pullX), sy(pullY));
    ctx.stroke();
    // Band from right tip to pull point
    ctx.beginPath();
    ctx.moveTo(sx(rightTip.x), sy(rightTip.y));
    ctx.lineTo(sx(pullX), sy(pullY));
    ctx.stroke();

    // Ammo ball at pull point
    ctx.beginPath();
    ctx.arc(sx(pullX), sy(pullY), sx(8), 0, Math.PI * 2);
    ctx.fillStyle = '#333';
    ctx.fill();
    ctx.strokeStyle = '#111';
    ctx.lineWidth = sx(1);
    ctx.stroke();

    // Aiming line (faint)
    const aimX = sling.x - (pullX - sling.x);
    const aimY = sling.y - (pullY - sling.y);
    ctx.setLineDash([sx(4), sx(4)]);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = sx(1);
    ctx.beginPath();
    ctx.moveTo(sx(sling.x), sy(sling.y));
    ctx.lineTo(sx(aimX), sy(aimY));
    ctx.stroke();
    ctx.setLineDash([]);
  } else {
    // Resting band
    ctx.strokeStyle = '#8B0000';
    ctx.lineWidth = sx(4);
    ctx.beginPath();
    ctx.moveTo(sx(leftTip.x), sy(leftTip.y));
    ctx.quadraticCurveTo(sx(sling.x), sy(sling.y - sling.prongH + 20), sx(rightTip.x), sy(rightTip.y));
    ctx.stroke();
  }
}

function drawParachute(x, y, radius) {
  const px = sx(x), py = sy(y), r = sx(radius);
  const canopyY = py - r * 2.5;
  const canopyR = r * 2.2;

  // Canopy
  ctx.beginPath();
  ctx.arc(px, canopyY, canopyR, Math.PI, 0, false);
  ctx.fillStyle = '#FF4444';
  ctx.fill();
  ctx.strokeStyle = '#CC0000';
  ctx.lineWidth = sx(1.5);
  ctx.stroke();
  // Stripes
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(px, canopyY, canopyR, Math.PI, Math.PI + Math.PI / 4, false);
  ctx.lineTo(px, canopyY);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(px, canopyY, canopyR, Math.PI + Math.PI / 2, Math.PI + Math.PI * 3 / 4, false);
  ctx.lineTo(px, canopyY);
  ctx.fill();

  // Strings
  ctx.strokeStyle = '#888';
  ctx.lineWidth = sx(1);
  for (let i = 0; i < 4; i++) {
    const angle = Math.PI + (i / 3) * Math.PI;
    ctx.beginPath();
    ctx.moveTo(px + Math.cos(angle) * canopyR, canopyY + Math.sin(angle) * canopyR * 0.3);
    ctx.lineTo(px, py - r * 0.5);
    ctx.stroke();
  }
}

function drawBomb(bomb) {
  if (bomb.exploding) return;
  const bx = sx(bomb.x), by = sy(bomb.y), r = sx(bomb.radius);

  // Parachute
  drawParachute(bomb.x, bomb.y, bomb.radius);

  // Bomb body
  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(bx - r * 0.3, by - r * 0.3, r * 0.1, bx, by, r);
  grad.addColorStop(0, '#555');
  grad.addColorStop(1, '#111');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = sx(1.5);
  ctx.stroke();

  // Fuse cap
  ctx.fillStyle = '#888';
  ctx.fillRect(bx - sx(3), by - r - sy(3), sx(6), sy(6));

  // Fuse spark
  const fuseX = bomb.x, fuseY = bomb.y - bomb.radius - 5;
  const sparkPhase = (frameCount * 0.2) % 1;
  ctx.beginPath();
  ctx.arc(sx(fuseX), sy(fuseY - 3), sx(3 + sparkPhase * 2), 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255, ${150 + Math.random() * 100}, 0, ${0.7 + sparkPhase * 0.3})`;
  ctx.fill();

  // Skull face on bomb
  ctx.fillStyle = '#FFF';
  // Eyes
  ctx.beginPath();
  ctx.ellipse(bx - r * 0.3, by - r * 0.15, r * 0.15, r * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx + r * 0.3, by - r * 0.15, r * 0.15, r * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(bx - r * 0.3, by - r * 0.1, r * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx + r * 0.3, by - r * 0.1, r * 0.07, 0, Math.PI * 2);
  ctx.fill();
  // Mouth
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = sx(1.5);
  ctx.beginPath();
  ctx.arc(bx, by + r * 0.2, r * 0.3, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();
}

function drawProjectile(proj) {
  const px = sx(proj.x), py = sy(proj.y), r = sx(proj.radius);
  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(px - r * 0.3, py - r * 0.3, 1, px, py, r);
  grad.addColorStop(0, '#777');
  grad.addColorStop(1, '#222');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = sx(1);
  ctx.stroke();

  // Trail
  ctx.globalAlpha = 0.3;
  for (let i = 1; i <= 3; i++) {
    ctx.beginPath();
    ctx.arc(sx(proj.x - proj.vx * i * 2), sy(proj.y - proj.vy * i * 2), r * (1 - i * 0.2), 0, Math.PI * 2);
    ctx.fillStyle = '#555';
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawExplosion(exp) {
  const progress = exp.frame / exp.maxFrames;
  const cx = sx(exp.x), cy = sy(exp.y);

  // Flash
  if (progress < 0.3) {
    const flashR = sx(40) * (progress / 0.3);
    const flashGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, flashR);
    flashGrad.addColorStop(0, 'rgba(255,255,200,0.8)');
    flashGrad.addColorStop(1, 'rgba(255,200,50,0)');
    ctx.fillStyle = flashGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, flashR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Explosion particles
  exp.particles.forEach(p => {
    const px = cx + sx(p.vx * exp.frame);
    const py = cy + sy(p.vy * exp.frame);
    const alpha = 1 - progress;
    const size = sx(p.size) * (1 - progress * 0.5);
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha})`;
    ctx.fill();
  });

  // Score popup
  if (exp.points) {
    ctx.fillStyle = `rgba(255,255,255,${1 - progress})`;
    ctx.font = `bold ${sx(18)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(`+${exp.points}`, cx, cy - sy(20 + progress * 30));
  }
}

    ctx.fillStyle = progress > 0.8 ? '#FF6B6B' : (progress > 0.5 ? '#FFD700' : '#4CAF50');
    ctx.fillRect(waveX + sx(5), barY, barWidth * (1 - progress), barHeight);
  }
}

// --- Game Logic ---

function spawnBomb() {
  const cfg = currentWaveConfig;
  
  // Determine if this is a special bomb
  const isSpecial = Math.random() < cfg.specialBombChance;
  const isCluster = Math.random() < cfg.clusterBombChance;
  
  // Calculate base properties
  const radius = cfg.minRadius + Math.random() * (cfg.maxRadius - cfg.minRadius);
  let speed = cfg.minSpeed + Math.random() * (cfg.maxSpeed - cfg.minSpeed);
  let sway = Math.random() * cfg.maxSway;
  
  // Special bomb types
  let bombType = 'normal';
  let health = cfg.bombHealth;
  
  if (isCluster) {
    bombType = 'cluster';
    // Cluster bombs are slightly slower but split when hit
    speed *= 0.85;
  } else if (isSpecial) {
    const specialTypes = ['fast', 'zigzag', 'tank'];
    bombType = specialTypes[Math.floor(Math.random() * specialTypes.length)];
    
    switch (bombType) {
      case 'fast':
        speed *= 1.5;  // 50% faster
        sway *= 0.5;   // Less sway
        break;
      case 'zigzag':
        speed *= 0.9;
        sway *= 2.5;   // Much more horizontal movement
        break;
      case 'tank':
        speed *= 0.6;  // Slow but tanky
        health = Math.max(2, health + 1);
        break;
    }
  }
  
  // Spawn position: ensure bombs don't spawn too close to edges
  // Higher waves have slightly wider spawn area
  const margin = 30 + Math.min(currentWave * 0.5, 30);
  const x = margin + Math.random() * (W - margin * 2);
  
  bombs.push({
    x: x,
    y: -50,
    radius: radius,
    speed: speed,
    sway: sway,
    swayOffset: Math.random() * Math.PI * 2,
    exploding: false,
    bombType: bombType,
    health: health,
    maxHealth: health
  });
}

function createExplosion(x, y, points, bombType = 'normal') {
  const particles = [];
  
  // Different explosion colors based on bomb type
  let colors;
  switch (bombType) {
    case 'fast':
      colors = [
        { r: 100, g: 200, b: 255 },
        { r: 50, g: 150, b: 255 },
        { r: 200, g: 230, b: 255 },
      ];
      break;
    case 'tank':
      colors = [
        { r: 150, g: 50, b: 50 },
        { r: 100, g: 30, b: 30 },
        { r: 200, g: 100, b: 100 },
      ];
      break;
    case 'cluster':
      colors = [
        { r: 255, g: 100, b: 255 },
        { r: 200, g: 50, b: 200 },
        { r: 255, g: 200, b: 255 },
      ];
      break;
    default:
      colors = [
        { r: 255, g: 100, b: 0 },
        { r: 255, g: 200, b: 0 },
        { r: 255, g: 50, b: 0 },
        { r: 255, g: 255, b: 100 },
        { r: 200, g: 50, b: 0 },
      ];
  }
  
  const particleCount = bombType === 'normal' ? 20 : 28;
  for (let i = 0; i < particleCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    const c = colors[Math.floor(Math.random() * colors.length)];
    particles.push({
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 4,
      r: c.r, g: c.g, b: c.b
    });
  }
  explosions.push({ x, y, frame: 0, maxFrames: 40, particles, points });
}

function createGroundExplosion(x, y) {
  const particles = [];
  for (let i = 0; i < 15; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
    const speed = 1 + Math.random() * 2;
    particles.push({
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 3,
      r: 100, g: 100, b: 100
    });
  }
  explosions.push({ x, y, frame: 0, maxFrames: 30, particles, points: null });
}

function fireProjectile() {
  if (!dragCurrent) return;
  const dx = dragCurrent.x - sling.x;
  const dy = dragCurrent.y - sling.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const clampDist = Math.min(dist, maxDrag);
  if (clampDist < 10) return;

  const angle = Math.atan2(dy, dx);
  const pullX = sling.x + Math.cos(angle) * clampDist;
  const pullY = sling.y + Math.sin(angle) * clampDist;

  const power = clampDist / maxDrag;
  const vx = -(pullX - sling.x) * 0.18;
  const vy = -(pullY - sling.y) * 0.18;

  projectiles.push({
    x: sling.x,
    y: sling.y - sling.prongH,
    vx: vx,
    vy: vy,
    radius: 12,
    gravity: 0.12
  });
}

function update() {
  if (gameOver || !gameStarted) return;
  frameCount++;
  
  // Update flower animation - each flower advances independently
  if (resources.flower.loaded && frameCount % 15 === 0) { // 15 frames = ~250ms at 60fps
    for (let i = 0; i < 4; i++) {
      if (flowerAlive[i]) {
        flowerFrameIndices[i]++;
      }
    }
  }

  // Update clouds (move right to left)
  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x < -c.w) c.x = W + c.w;
  });

  // ========== WAVE SYSTEM UPDATE ==========
  if (isInterWave) {
    // Inter-wave break
    interWaveTimer++;
    if (interWaveTimer >= interWaveDuration) {
      isInterWave = false;
      startWave(currentWave + 1);
    }
  } else {
    // Active wave
    waveTimer++;
    
    // Check if it's time to spawn a bomb
    if (bombsSpawnedThisWave < waveSpawnSchedule.length && 
        waveTimer >= waveSpawnSchedule[bombsSpawnedThisWave]) {
      spawnBomb();
      bombsSpawnedThisWave++;
    }
    
    // Check if wave should end
    if (waveTimer >= currentWaveConfig.waveDurationFrames && bombs.length === 0) {
      endWave();
    }
  }
  // ========== END WAVE SYSTEM UPDATE ==========

  // Update bombs
  const flowerPositions = getFlowerPositions();
  for (let i = bombs.length - 1; i >= 0; i--) {
    const bomb = bombs[i];
    bomb.y += bomb.speed;
    bomb.x += Math.sin(frameCount * 0.02 + bomb.swayOffset) * bomb.sway;

    // Hit ground
    if (bomb.y > H - 80 - bomb.radius) {
      createGroundExplosion(bomb.x, H - 85);
      bombs.splice(i, 1);
      // Only kill the nearest alive flower if bomb is close enough
      let closestIdx = -1;
      let closestDist = Infinity;
      for (let f = 0; f < 4; f++) {
        if (!flowerAlive[f]) continue;
        const pos = flowerPositions[f] || { x: 90 + f * 90, y: 708 };
        const dist = Math.abs(bomb.x - pos.x);
        if (dist < flowerHitRadius && dist < closestDist) {
          closestDist = dist;
          closestIdx = f;
        }
      }
      if (closestIdx >= 0) {
        flowerAlive[closestIdx] = false;
        lives--;
        if (lives <= 0) {
          lives = 0;
          gameOver = true;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('bobomb_highscore', highScore.toString());
          }
        }
      }
    }
  }

  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;

    // Off screen
    if (p.x < -50 || p.x > W + 50 || p.y < -100 || p.y > H + 50) {
      projectiles.splice(i, 1);
      continue;
    }

    // Collision with bombs
    for (let j = bombs.length - 1; j >= 0; j--) {
      const b = bombs[j];
      const dx = p.x - b.x;
      const dy = p.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < p.radius + b.radius + 5) {
        // Hit!
        b.health--;
        
        if (b.health <= 0) {
          // Bomb destroyed
          const points = 100 + Math.floor((H - 80 - b.y) / H * 100); // more points for higher hits
          score += points;
          createExplosion(b.x, b.y, points, b.bombType);
          bombs.splice(j, 1);
        } else {
          // Bomb damaged but not destroyed (tank bombs)
          createExplosion(b.x, b.y, null, 'tank');
          // Push bomb slightly
          b.x += p.vx * 0.3;
          b.y += p.vy * 0.3;
        }
      }
    }
  }

  // Update explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].frame++;
    if (explosions[i].frame >= explosions[i].maxFrames) {
      explosions.splice(i, 1);
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1; // Reset transparency
  drawSky();
  drawSun();
  drawRainbow();
  clouds.forEach(drawCloud);
  drawWall();
  drawHealthFlowers();
  bombs.forEach(drawBomb);
  projectiles.forEach(drawProjectile);
  explosions.forEach(drawExplosion);
  drawSlingshot();
  drawUI();

  if (gameOver) {
    drawGameOver();
  } else if (!gameStarted) {
    drawStartScreen();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function resetGame() {
  score = 0;
  lives = 4;
  flowerAlive = [true, true, true, true];
  flowerFrameIndices = [0, 1, 2, 3]; // Reset to different starting frames
  gameOver = false;
  bombs = [];
  projectiles = [];
  explosions = [];
  frameCount = 0;
  dragging = false;
  dragStart = null;
  dragCurrent = null;
  
  // Reset wave system
  currentWave = 0;
  waveTimer = 0;
  interWaveTimer = 0;
  isInterWave = true; // Start with a break to let player prepare
  interWaveDuration = 180; // 3 seconds to start
  bombsSpawnedThisWave = 0;
  totalBombsThisWave = 0;
  waveSpawnSchedule = [];
}

// --- Input Handling ---

function getInputPos(e) {
  if (e.touches) {
    return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
  }
  return { clientX: e.clientX, clientY: e.clientY };
}

function handleStart(e) {
  e.preventDefault();
  const pos = getInputPos(e);
  const gp = toGame(pos.clientX, pos.clientY);

  if (!gameStarted) {
    // Check start button
    if (gp.x > W / 2 - 70 && gp.x < W / 2 + 70 && gp.y > H / 2 + 80 && gp.y < H / 2 + 120) {
      gameStarted = true;
      resetGame();
    }
    return;
  }

  if (gameOver) {
    // Check play again button
    if (gp.x > W / 2 - 70 && gp.x < W / 2 + 70 && gp.y > H / 2 + 70 && gp.y < H / 2 + 106) {
      resetGame();
    }
    return;
  }

  // Start dragging slingshot (can click anywhere in lower portion)
  if (gp.y > H * 0.5) {
    dragging = true;
    dragStart = gp;
    dragCurrent = gp;
  }
}

function handleMove(e) {
  e.preventDefault();
  if (!dragging) return;
  const pos = getInputPos(e);
  dragCurrent = toGame(pos.clientX, pos.clientY);
}

function handleEnd(e) {
  e.preventDefault();
  if (!dragging) return;
  fireProjectile();
  dragging = false;
  dragStart = null;
  dragCurrent = null;
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('mouseleave', handleEnd);
canvas.addEventListener('touchstart', handleStart, { passive: false });
canvas.addEventListener('touchmove', handleMove, { passive: false });
canvas.addEventListener('touchend', handleEnd, { passive: false });

// Start the game loop
gameLoop();
</script>
